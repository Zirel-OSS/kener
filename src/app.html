    <link
      rel="icon"

      type="image/png"
    />
    <link
      rel="icon"
      href="https://cdn.krack.ing/kracking-assets/favicon.ico"
      sizes="48x48"
    />

      rel="apple-touch-icon"
      href="https://cdn.krack.ing/kracking-assets/favicon.png"
    />
    <link rel="preconnect" href="https://cdn.krack.ing" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.krack.ing" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta property="og:locale" content="en_US" />
    %sveltekit.head%

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
